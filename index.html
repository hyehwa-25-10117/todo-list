<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tasks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 아쿠아리움 배경 레이어 -->
  <div class="aquarium-bg" id="aquarium-bg" aria-hidden="true">
    <div class="aq-shimmer"></div>
    <div class="aq-creatures" id="aq-creatures"></div>
    <div class="aq-bubbles"  id="aq-bubbles"></div>
  </div>

  <div class="app">

    <header class="app-header">
      <h1>My Tasks</h1>
      <button id="theme-toggle" class="theme-toggle"
        aria-label="테마 전환 (Alt+D)" title="Alt+D">
        <span id="theme-icon" aria-hidden="true">🌙</span>
      </button>
    </header>

    <section id="dashboard" class="dashboard"
      aria-label="할 일 진행률 통계"></section>

    <!-- 입력 영역 -->
    <div class="input-area" role="group" aria-label="새 할 일 추가">
      <label for="category-select" class="sr-only">카테고리 선택</label>
      <select id="category-select" aria-label="카테고리">
        <option value="업무">💼 업무</option>
        <option value="개인">🏠 개인</option>
        <option value="공부">📚 공부</option>
      </select>
      <label for="todo-input" class="sr-only">할 일 내용</label>
      <input type="text" id="todo-input"
        placeholder="할 일 입력... (Alt+N)"
        autocomplete="off"
        maxlength="500"
        aria-describedby="duplicate-warning">
      <button id="add-btn" aria-label="할 일 추가">추가</button>
    </div>

    <p id="duplicate-warning" class="duplicate-warning"
      role="alert" aria-live="assertive" hidden>
      동일한 할 일이 이미 있습니다. 한 번 더 <strong>추가</strong>를 누르면 등록됩니다.
    </p>

    <!-- 검색 -->
    <div class="search-area" role="search">
      <label for="search-input" class="sr-only">할 일 검색</label>
      <input type="text" id="search-input"
        placeholder="🔍  검색..."
        autocomplete="off"
        aria-label="할 일 검색">
      <button id="search-clear" class="search-clear"
        aria-label="검색어 지우기" hidden>✕</button>
    </div>

    <!-- 필터 + 완료삭제 -->
    <div class="filter-bar" role="group" aria-label="카테고리 필터">
      <button class="filter-btn active" data-filter="전체"
        aria-pressed="true">전체</button>
      <button class="filter-btn" data-filter="업무"
        aria-pressed="false">💼 업무</button>
      <button class="filter-btn" data-filter="개인"
        aria-pressed="false">🏠 개인</button>
      <button class="filter-btn" data-filter="공부"
        aria-pressed="false">📚 공부</button>
      <button id="clear-completed-btn" class="clear-btn"
        aria-label="완료된 항목 모두 삭제">완료 삭제</button>
    </div>

    <!-- 정렬 + 내보내기/가져오기 -->
    <div class="toolbar" role="toolbar" aria-label="목록 도구">
      <div class="sort-wrap">
        <label for="sort-select" class="toolbar-label">정렬</label>
        <select id="sort-select" aria-label="정렬 기준 선택">
          <option value="newest">최신순</option>
          <option value="oldest">오래된순</option>
          <option value="category">카테고리순</option>
          <option value="status">완료 상태순</option>
        </select>
      </div>
      <div class="io-wrap">
        <button id="export-btn" class="io-btn"
          aria-label="할 일 목록을 JSON 파일로 내보내기">⬆ 내보내기</button>
        <button id="import-btn" class="io-btn"
          aria-label="JSON 파일에서 할 일 가져오기">⬇ 가져오기</button>
        <input type="file" id="import-file"
          accept=".json" hidden aria-hidden="true">
      </div>
    </div>

    <ul id="todo-list" role="list" aria-label="할 일 목록"></ul>

    <p id="empty-msg" class="empty-msg"
      aria-live="polite">할 일이 없습니다. 추가해보세요!</p>

  </div>

  <!-- 확인 모달 -->
  <div id="confirm-modal" class="modal-overlay"
    role="dialog" aria-modal="true" aria-labelledby="modal-msg" hidden>
    <div class="modal-box">
      <p id="modal-msg" class="modal-msg-text"></p>
      <div class="modal-actions">
        <button id="modal-cancel-btn" class="modal-btn modal-btn-cancel">취소</button>
        <button id="modal-confirm-btn" class="modal-btn modal-btn-danger">삭제</button>
      </div>
    </div>
  </div>

  <!-- 토스트 -->
  <div id="toast" class="toast"
    role="status" aria-live="polite" aria-atomic="true" hidden>
    <span id="toast-msg" class="toast-msg"></span>
    <button id="toast-action-btn" class="toast-action" hidden>되돌리기</button>
    <button id="toast-close-btn" class="toast-close" aria-label="알림 닫기">✕</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
